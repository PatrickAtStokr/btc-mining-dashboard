name: Fetch STRC Notional

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 min
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run fetch script
        run: node scripts/fetchNotional.js

      - name: Commit changes
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@github.com"
          git add data/
          git commit -m "update notional" || echo "no changes"
          git push
