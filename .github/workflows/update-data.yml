name: Update Dashboard Data

on:
  schedule:
    - cron: '0 6 * * *'
    - cron: '0 6 * * 1-5'
    - cron: '0 12 * * 1-5'
    - cron: '0 18 * * 1-5'
    - cron: '0 6 * * 0,6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install yfinance playwright requests
          playwright install chromium --with-deps

      # Step 1: Automated data
      - name: Fetch automated data (data.json)
        run: python fetch_data.py

      # Step 2: Manual + STRC (UPDATED)
      - name: Scrape manual data sources (manual_data.json)
        env:
          LUXOR_API_KEY: ${{ secrets.LUXOR_API_KEY }}
          LUXOR_SUBACCOUNT: ${{ secrets.LUXOR_SUBACCOUNT }}
        run: python scrape_manual.py

      # OPTIONAL: Step 3 — separate notional script
      # (only if you DON'T add it inside scrape_manual.py)
      - name: Fetch STRC Notional
        run: python fetch_notional.py
        continue-on-error: true

      # Commit
      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json manual_data.json

          if git diff --staged --quiet; then
            echo "No data changes — skipping commit."
          else
            git commit -m "Auto-update dashboard data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
