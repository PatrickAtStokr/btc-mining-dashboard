name: Update Dashboard Data

on:
  schedule:
    # Runs 3x daily on weekdays: 06:00, 12:00, 18:00 UTC
    - cron: '0 6 * * 1-5'
    - cron: '0 12 * * 1-5'
    - cron: '0 18 * * 1-5'
    # Once on weekends at 06:00 UTC
    - cron: '0 6 * * 0,6'
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions tab

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install yfinance playwright
          playwright install chromium --with-deps

      # Step 1: Fetch automated data (BTC price, network, derived hashprice)
      - name: Fetch automated data (data.json)
        run: python fetch_data.py

      # Step 2: Scrape manual sources (BMN2, Luxor, STRC)
      - name: Scrape manual data sources (manual_data.json)
        env:
          LUXOR_API_KEY: ${{ secrets.LUXOR_API_KEY }}
          LUXOR_SUBACCOUNT: ${{ secrets.LUXOR_SUBACCOUNT }}
        run: python scrape_manual.py

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json manual_data.json
          # Only commit if there are actual changes
          if git diff --staged --quiet; then
            echo "No data changes — skipping commit."
          else
            git commit -m "Auto-update dashboard data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
